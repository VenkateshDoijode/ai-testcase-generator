[jira]
base_url        = https://your-jira-instance.example.com
jira_token      = YOUR_JIRA_PERSONAL_ACCESS_TOKEN
zephyr_path     = /secure/Tests.jspa#/v2/testCases?projectId=YOUR_PROJECT_ID
project_key     = YOUR_PROJECT_KEY
project_id      = YOUR_PROJECT_ID

[testcase]
owner_account_id  = YOUR_JIRA_ACCOUNT_ID
test_cycle        = YOUR_PROJECT_KEY-CXXXX
test_reviewer_id  = YOUR_REVIEWER_JIRA_ACCOUNT_ID
test_case_key     = YOUR_PROJECT_KEY-TXXXX

[ai]
hf_token      = YOUR_HUGGINGFACE_API_TOKEN
hf_endpoint   = https://artifact.qa.net/artifactory/api/huggingfaceml/huggingface

[defaults]
type_of_test      = Regression Test
automation_status = Manual
